<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Curae — Page not found</title>
<meta name="robots" content="noindex" />
<link rel="icon" href="favicon.svg" type="image/svg+xml" sizes="any" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..500;1,9..144,300..500&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{--bg:#F4F0E8;--ink:#19170F;--muted:#6b6655;--accent:#C2542E;--sans:"Inter",-apple-system,BlinkMacSystemFont,sans-serif;--serif:"Fraunces",Georgia,serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px;-webkit-font-smoothing:antialiased}
  .brand{font-family:var(--serif);font-weight:500;font-size:clamp(44px,12vw,96px);letter-spacing:-.03em;line-height:1}
  .brand .d{color:var(--accent)}
  .code{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);font-weight:500;margin-top:26px}
  .msg{font-family:var(--serif);font-style:italic;font-weight:300;font-size:clamp(20px,4vw,30px);color:var(--muted);margin-top:10px}
  .home{display:inline-block;margin-top:34px;font-size:13px;letter-spacing:.04em;position:relative;color:var(--ink)}
  .home::after{content:"";position:absolute;left:0;bottom:-3px;height:1px;width:0;background:var(--accent);transition:width .3s}
  .home:hover::after{width:100%}
  a{text-decoration:none;color:inherit}
  :focus-visible{outline:2px solid var(--accent);outline-offset:3px}
</style>
</head>
<body>
  <a href="./" class="brand">Curae<span class="d">.</span></a>
  <p class="code">404 — page not found</p>
  <p class="msg">This one got away from us.</p>
  <a class="home" href="./">Back to home</a>
</body>
</html>
